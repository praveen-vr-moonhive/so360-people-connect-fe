name: Deploy People Connect Frontend to Production

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Checkout shell-fe packages
        uses: actions/checkout@v4
        with:
          repository: Neonbee-ai/so360-shell-fe
          token: ${{ secrets.PAT_TOKEN }}
          path: _shell-fe
          sparse-checkout: packages
          sparse-checkout-cone-mode: true

      - name: Link and build shell packages
        run: |
          RUNNER_PARENT="$(dirname "$(dirname "$GITHUB_WORKSPACE")")"
          ln -sfn "$GITHUB_WORKSPACE/_shell-fe" "$RUNNER_PARENT/so360-shell-fe"
          for pkg in shell-context design-system event-bus formatters; do
            pkgdir="$GITHUB_WORKSPACE/_shell-fe/packages/$pkg"
            if [ -d "$pkgdir" ]; then
              (cd "$pkgdir" && npm install --legacy-peer-deps 2>/dev/null || true)
              (cd "$pkgdir" && npm run build 2>/dev/null || true)
            fi
          done

      - name: Install and build
        run: |
          npm install --legacy-peer-deps
          printf '%s\n' \
            "VITE_BASE_URL=https://cdn.neonbee.app/people/" \
            "VITE_SO360_CORE_API=https://api.neonbee.app/core" \
            "VITE_SO360_PEOPLE_API=https://api.neonbee.app/people" \
            "VITE_ENVIRONMENT=cloud" \
            > .env
          npm run build

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}

      - name: Deploy to Production
        env:
          SERVER_IP: ${{ secrets.PROD_SERVER_IP }}
          NGINX_ROOT: /var/www/cdn.neonbee.app/html/people
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          ssh root@$SERVER_IP "mkdir -p '$NGINX_ROOT'"
          rsync -avz --delete dist/ "root@$SERVER_IP:$NGINX_ROOT/"
          ssh root@$SERVER_IP "nginx -s reload"
          echo "Deployed People Connect to cdn.neonbee.app/people"
