name: Deploy People Connect Frontend to Production

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies and build
        run: |
          npm install --legacy-peer-deps
          printf '%s\n' \
              "VITE_BASE_URL=https://cdn.neonbee.app/people/" \
              "VITE_SO360_CORE_API=https://api.neonbee.app/core" \
              "VITE_SO360_PEOPLE_API=https://api.neonbee.app/people" \
              "VITE_ENVIRONMENT=cloud" \
              > .env
          npm run build

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}

      - name: Deploy to Production CDN
        env:
          SERVER_IP: ${{ secrets.PROD_SERVER_IP }}
          NGINX_ROOT: /var/www/cdn.neonbee.app/html/people
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          ssh root@$SERVER_IP "mkdir -p '$NGINX_ROOT'"
          rsync -avz --delete dist/ "root@$SERVER_IP:$NGINX_ROOT/"
          ssh root@$SERVER_IP "nginx -s reload"
          echo "Deployed People Connect to cdn.neonbee.app/people"
