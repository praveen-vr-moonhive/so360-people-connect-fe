name: Deploy People Connect Frontend to Server

on:
  push:
    branches:
      - develop
      - qa
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}

    - name: Deploy to Dev
      if: github.ref == 'refs/heads/develop'
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        DOMAIN: dev.people.skyoffice360.com
        BUILD_DIR: /github/SO360 V.2/so360-people-connect/so360-people-connect-fe
        NGINX_ROOT: /var/www/dev.people.skyoffice360.com/html
      run: |
        ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
        ssh root@$SERVER_IP "mkdir -p '$BUILD_DIR'"
        rsync -avz --delete --exclude 'node_modules' --exclude 'dist' --exclude '.git' ./ "root@$SERVER_IP:$BUILD_DIR/"
        ssh root@$SERVER_IP "BUILD_DIR='$BUILD_DIR' DOMAIN='$DOMAIN' NGINX_ROOT='$NGINX_ROOT' bash -s" << 'DEPLOY_SCRIPT'
          set -e
          cd "${BUILD_DIR}"
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          ln -sfn "/github/SO360 V.2/so360-shell-fe" "$(dirname "${BUILD_DIR}")/so360-shell-fe" 2>/dev/null || true
          npm install --legacy-peer-deps
          export VITE_BASE_URL=https://${DOMAIN}/
          export VITE_SO360_CORE_API=https://dev.api.skyoffice360.com/core
          export VITE_SO360_PEOPLE_API=https://dev.api.skyoffice360.com/people
          npm run build
          mkdir -p "${NGINX_ROOT}"
          cp -r dist/* "${NGINX_ROOT}/"
          echo "✅ Deployed to https://${DOMAIN}"
        DEPLOY_SCRIPT

    - name: Deploy to Staging
      if: github.ref == 'refs/heads/qa'
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        DOMAIN: staging.people.skyoffice360.com
        BUILD_DIR: /github/SO360 V.2/so360-people-connect/so360-people-connect-fe
        NGINX_ROOT: /var/www/staging.people.skyoffice360.com/html
      run: |
        ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
        ssh root@$SERVER_IP "mkdir -p '$BUILD_DIR'"
        rsync -avz --delete --exclude 'node_modules' --exclude 'dist' --exclude '.git' ./ "root@$SERVER_IP:$BUILD_DIR/"
        ssh root@$SERVER_IP "BUILD_DIR='$BUILD_DIR' DOMAIN='$DOMAIN' NGINX_ROOT='$NGINX_ROOT' bash -s" << 'DEPLOY_SCRIPT'
          set -e
          cd "${BUILD_DIR}"
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          ln -sfn "/github/SO360 V.2/so360-shell-fe" "$(dirname "${BUILD_DIR}")/so360-shell-fe" 2>/dev/null || true
          npm install --legacy-peer-deps
          export VITE_BASE_URL=https://${DOMAIN}/
          export VITE_SO360_CORE_API=https://staging.api.skyoffice360.com/core
          export VITE_SO360_PEOPLE_API=https://staging.api.skyoffice360.com/people
          npm run build
          mkdir -p "${NGINX_ROOT}"
          cp -r dist/* "${NGINX_ROOT}/"
          echo "✅ Deployed to https://${DOMAIN}"
        DEPLOY_SCRIPT

    - name: Deploy to Production
      if: github.ref == 'refs/heads/main'
      env:
        SERVER_IP: ${{ secrets.PROD_NGINX_VM }}
        DOMAIN: cdn.neonbee.app
        BUILD_DIR: /github/SO360 V.2/so360-people-connect/so360-people-connect-fe
        NGINX_ROOT: /var/www/cdn.neonbee.app/html/people
      run: |
        ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
        ssh root@$SERVER_IP "mkdir -p '$BUILD_DIR'"
        rsync -avz --delete --exclude 'node_modules' --exclude 'dist' --exclude '.git' ./ "root@$SERVER_IP:$BUILD_DIR/"
        ssh root@$SERVER_IP "BUILD_DIR='$BUILD_DIR' DOMAIN='$DOMAIN' NGINX_ROOT='$NGINX_ROOT' MODULE='people' bash -s" << 'DEPLOY_SCRIPT'
          set -e
          cd "${BUILD_DIR}"
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          ln -sfn "/github/SO360 V.2/so360-shell-fe" "$(dirname "${BUILD_DIR}")/so360-shell-fe" 2>/dev/null || true
          npm install --legacy-peer-deps
          export VITE_BASE_URL=https://cdn.neonbee.app/${MODULE}/
          export VITE_SO360_CORE_API=https://api.neonbee.app/core
          export VITE_SO360_CRM_API=https://api.neonbee.app/crm
          export VITE_SO360_INVENTORY_API=https://api.neonbee.app/inventory
          export VITE_SO360_ACCOUNTING_API=https://api.neonbee.app/accounting
          export VITE_SO360_PROJECTS_API=https://api.neonbee.app/projects
          export VITE_SO360_TIMESHEET_API=https://api.neonbee.app/timesheet
          export VITE_SO360_PEOPLE_API=https://api.neonbee.app/people
          export VITE_SO360_DAILYSTORE_API=https://api.neonbee.app/dailystore
          export VITE_SO360_NEURA_API=https://api.neonbee.app/neura
          export VITE_SO360_FLOW_API=https://api.neonbee.app/flow
          export VITE_SO360_INSIGHT_API=https://api.neonbee.app/insight
          export VITE_SO360_INBOX_API=https://api.neonbee.app/inbox
          export VITE_SO360_FORMS_API=https://api.neonbee.app/forms
          export VITE_SO360_FULFILLMENT_API=https://api.neonbee.app/fulfillment
          export VITE_SO360_SUPPORT_API=https://api.neonbee.app/support
          export VITE_SO360_SUBSCRIPTION_API=https://api.neonbee.app/subscription
          export VITE_SO360_STOREFRONT_PREVIEW_URL=https://neonbee.store
          npm run build
          mkdir -p "${NGINX_ROOT}"
          rm -rf "${NGINX_ROOT:?}"/*
          cp -r dist/* "${NGINX_ROOT}/"
          echo "✅ Deployed to https://cdn.neonbee.app/${MODULE}/"
        DEPLOY_SCRIPT

    - name: Purge Cloudflare cache for /people/
      if: github.ref == 'refs/heads/main'
      run: |
        echo "🌀 Purging cdn.neonbee.app/people/ from Cloudflare edge cache"
        RESP=$(curl -sX POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
          -H "Authorization: Bearer ${{ secrets.CF_PURGE_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"files":["https://cdn.neonbee.app/people/assets/remoteEntry.js","https://cdn.neonbee.app/people/index.html"]}')
        echo "$RESP"
        echo "$RESP" | grep -q '"success":true' || { echo "❌ CF purge failed"; exit 1; }
        echo "✅ Cloudflare cache purged for /people/"
