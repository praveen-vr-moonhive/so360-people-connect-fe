name: Deploy People Connect Frontend to Server

on:
  push:
    branches:
      - develop
      - qa

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}

    - name: Deploy to Dev
      if: github.ref == 'refs/heads/develop'
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        DOMAIN: dev.people.skyoffice360.com
        BUILD_DIR: /github/SO360 V.2/so360-people-connect/so360-people-connect-fe
        NGINX_ROOT: /var/www/dev.people.skyoffice360.com/html
      run: |
        ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
        ssh root@$SERVER_IP "mkdir -p '$BUILD_DIR'"
        rsync -avz --delete --exclude 'node_modules' --exclude 'dist' --exclude '.git' ./ "root@$SERVER_IP:$BUILD_DIR/"
        ssh root@$SERVER_IP "BUILD_DIR='$BUILD_DIR' DOMAIN='$DOMAIN' NGINX_ROOT='$NGINX_ROOT' bash -s" << 'DEPLOY_SCRIPT'
          set -e
          cd "${BUILD_DIR}"
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          ln -sfn "/github/SO360 V.2/so360-shell-fe" "$(dirname "${BUILD_DIR}")/so360-shell-fe" 2>/dev/null || true
          npm install --legacy-peer-deps
          export VITE_BASE_URL=https://dev.people.skyoffice360.com/
          export VITE_SO360_CORE_API=https://dev.api.skyoffice360.com/core
          export VITE_SO360_PEOPLE_API=https://dev.api.skyoffice360.com/people
          npm run build
          mkdir -p "${NGINX_ROOT}"
          cp -r dist/* "${NGINX_ROOT}/"
          # ── Always enforce NGINX CORS config (never let it drift) ──
          cat > "/etc/nginx/sites-available/${DOMAIN}" << NGINX_BLOCK
server {
    listen 80;
    server_name ${DOMAIN};
    root ${NGINX_ROOT};
    index index.html;

    access_log /var/log/nginx/${DOMAIN}-access.log;
    error_log /var/log/nginx/${DOMAIN}-error.log;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/vnd.ms-fontobject application/x-font-ttf font/opentype image/svg+xml image/x-icon;

    location ~* /assets/remoteEntry\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range" always;
        try_files \$uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        try_files \$uri =404;
    }

    location / {
        try_files \$uri \$uri/ /index.html;
    }
}
NGINX_BLOCK
          ln -sfn "/etc/nginx/sites-available/${DOMAIN}" "/etc/nginx/sites-enabled/${DOMAIN}"
          nginx -t && systemctl reload nginx
          echo "✅ NGINX CORS config enforced for ${DOMAIN}"
          echo "✅ Deployed to https://${DOMAIN}"
        DEPLOY_SCRIPT

    - name: Deploy to Staging
      if: github.ref == 'refs/heads/qa'
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        DOMAIN: staging.people.skyoffice360.com
        BUILD_DIR: /github/SO360 V.2/so360-people-connect/so360-people-connect-fe
        NGINX_ROOT: /var/www/staging.people.skyoffice360.com/html
      run: |
        ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
        ssh root@$SERVER_IP "mkdir -p '$BUILD_DIR'"
        rsync -avz --delete --exclude 'node_modules' --exclude 'dist' --exclude '.git' ./ "root@$SERVER_IP:$BUILD_DIR/"
        ssh root@$SERVER_IP "BUILD_DIR='$BUILD_DIR' DOMAIN='$DOMAIN' NGINX_ROOT='$NGINX_ROOT' bash -s" << 'DEPLOY_SCRIPT'
          set -e
          cd "${BUILD_DIR}"
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          ln -sfn "/github/SO360 V.2/so360-shell-fe" "$(dirname "${BUILD_DIR}")/so360-shell-fe" 2>/dev/null || true
          npm install --legacy-peer-deps
          export VITE_BASE_URL=https://staging.people.skyoffice360.com/
          export VITE_SO360_CORE_API=https://staging.api.skyoffice360.com/core
          export VITE_SO360_PEOPLE_API=https://staging.api.skyoffice360.com/people
          npm run build
          mkdir -p "${NGINX_ROOT}"
          cp -r dist/* "${NGINX_ROOT}/"
          # ── Always enforce NGINX CORS config (never let it drift) ──
          cat > "/etc/nginx/sites-available/${DOMAIN}" << NGINX_BLOCK
server {
    listen 80;
    server_name ${DOMAIN};
    root ${NGINX_ROOT};
    index index.html;

    access_log /var/log/nginx/${DOMAIN}-access.log;
    error_log /var/log/nginx/${DOMAIN}-error.log;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/vnd.ms-fontobject application/x-font-ttf font/opentype image/svg+xml image/x-icon;

    location ~* /assets/remoteEntry\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range" always;
        try_files \$uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        try_files \$uri =404;
    }

    location / {
        try_files \$uri \$uri/ /index.html;
    }
}
NGINX_BLOCK
          ln -sfn "/etc/nginx/sites-available/${DOMAIN}" "/etc/nginx/sites-enabled/${DOMAIN}"
          nginx -t && systemctl reload nginx
          echo "✅ NGINX CORS config enforced for ${DOMAIN}"
          echo "✅ Deployed to https://${DOMAIN}"
        DEPLOY_SCRIPT

    - name: Purge Cloudflare Cache
      if: always()
      env:
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID_SKYOFFICE360 }}
      run: |
        if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
          echo "⚠️  CF credentials not set — skipping cache purge"
          exit 0
        fi
        RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
          -H "Authorization: Bearer ${CF_API_TOKEN}" \
          -H "Content-Type: application/json" \
          --data '{"purge_everything":true}')
        echo "✅ Cloudflare cache purged"
