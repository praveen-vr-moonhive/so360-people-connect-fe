name: Deploy people-connect-fe

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    uses: Neonbee-ai/neonbee-devops/.github/workflows/neonbee-deploy-vite-mfe.yml@main
    with:
      service_name: people-connect-fe
      nginx_root_dev: /var/www/dev.people.skyoffice360.com/html
      nginx_root_staging: /var/www/staging.people.skyoffice360.com/html
      vite_base_url_dev: https://dev.people.skyoffice360.com/
      vite_base_url_staging: https://staging.people.skyoffice360.com/
    secrets: inherit