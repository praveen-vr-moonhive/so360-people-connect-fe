name: Deploy People Connect Frontend

on:
  push:
    branches:
      - develop
      - qa

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies and build (dev)
        if: github.ref == 'refs/heads/develop'
        run: |
          npm install --legacy-peer-deps
          printf '%s\n' \
              "VITE_BASE_URL=https://dev.people.skyoffice360.com/" \
              "VITE_SO360_CORE_API=https://dev.api.skyoffice360.com/core" \
              "VITE_SO360_PEOPLE_API=https://dev.api.skyoffice360.com/people" \
              "VITE_ENVIRONMENT=cloud" \
              > .env
          npm run build

      - name: Install dependencies and build (staging)
        if: github.ref == 'refs/heads/qa'
        run: |
          npm install --legacy-peer-deps
          printf '%s\n' \
              "VITE_BASE_URL=https://staging.people.skyoffice360.com/" \
              "VITE_SO360_CORE_API=https://staging.api.skyoffice360.com/core" \
              "VITE_SO360_PEOPLE_API=https://staging.api.skyoffice360.com/people" \
              "VITE_ENVIRONMENT=cloud" \
              > .env
          npm run build

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CONTABO_SSH_KEY }}

      - name: Deploy to Dev
        if: github.ref == 'refs/heads/develop'
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          NGINX_ROOT: /var/www/dev.people.skyoffice360.com/html
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          ssh root@$SERVER_IP "mkdir -p '$NGINX_ROOT'"
          rsync -avz --delete dist/ "root@$SERVER_IP:$NGINX_ROOT/"
          ssh root@$SERVER_IP "nginx -s reload"
          echo "Deployed to dev.people.skyoffice360.com"

      - name: Deploy to Staging
        if: github.ref == 'refs/heads/qa'
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          NGINX_ROOT: /var/www/staging.people.skyoffice360.com/html
        run: |
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          ssh root@$SERVER_IP "mkdir -p '$NGINX_ROOT'"
          rsync -avz --delete dist/ "root@$SERVER_IP:$NGINX_ROOT/"
          ssh root@$SERVER_IP "nginx -s reload"
          echo "Deployed to staging.people.skyoffice360.com"
